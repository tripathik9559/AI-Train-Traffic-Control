<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ER Diagram — Railway Control System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px;
           display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: 0.78rem; color: #8b949e; background: #21262d; padding: 3px 10px;
                border-radius: 20px; border: 1px solid #30363d; }
  .controls { margin-left: auto; display: flex; gap: 8px; }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #30363d; background: #21262d;
         color: #e6edf3; font-size: 0.78rem; cursor: pointer; }
  .btn:hover { background: #30363d; }
  .canvas-wrap { overflow: auto; padding: 40px; min-height: calc(100vh - 57px); }
  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }

  /* ── Table box ─────────────────────────────── */
  .tbl-header { fill: #1f6feb; }
  .tbl-header-auth  { fill: #388bfd; }
  .tbl-header-train { fill: #3fb950; }
  .tbl-header-station{ fill: #d29922; }
  .tbl-header-sched { fill: #bc8cff; }
  .tbl-header-conflict { fill: #f85149; }
  .tbl-header-ai    { fill: #79c0ff; }
  .tbl-header-notif { fill: #e3b341; }
  .tbl-header-ml    { fill: #56d364; }
  .tbl-header-sim   { fill: #f0883e; }
  .tbl-header-report{ fill: #8b949e; }
  .tbl-header-analytics { fill: #7ee787; }
  .tbl-bg   { fill: #161b22; stroke: #30363d; stroke-width: 1; }
  .tbl-row  { fill: #0d1117; }
  .tbl-row-alt { fill: #161b22; }
  .col-pk   { fill: #f0883e; font-size: 10px; }
  .col-fk   { fill: #79c0ff; font-size: 10px; }
  .col-name { fill: #e6edf3; font-size: 10px; }
  .col-type { fill: #8b949e; font-size: 9.5px; }
  .rel-line { fill: none; stroke-width: 1.5; }
  .rel-pk   { stroke: #3fb950; }
  .rel-fk   { stroke: #388bfd; }
  .tbl-title { fill: #ffffff; font-size: 11px; font-weight: 700; }
  .legend-box { fill: #161b22; stroke: #30363d; stroke-width: 1; }
</style>
</head>
<body>
<header>
  <span>🚆</span>
  <h1>Railway Control System — Entity Relationship Diagram</h1>
  <span>13 tables &nbsp;|&nbsp; MySQL InnoDB</span>
  <div class="controls">
    <button class="btn" onclick="zoom(1.2)">＋ Zoom In</button>
    <button class="btn" onclick="zoom(0.85)">－ Zoom Out</button>
    <button class="btn" onclick="resetZoom()">↺ Reset</button>
    <button class="btn" onclick="window.print()">🖨 Print</button>
  </div>
</header>

<div class="canvas-wrap" id="canvas">
<svg id="erd" viewBox="0 0 2400 1700" width="2400" height="1700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950" />
  </marker>
  <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#388bfd" />
  </marker>
</defs>

<!-- ═══════════════════════════════════════════════════════════
     RELATIONSHIP LINES (drawn first, behind tables)
════════════════════════════════════════════════════════════ -->
<!-- auth_users → trains (created_by) -->
<line x1="290" y1="160" x2="500" y2="265" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.6"/>
<!-- auth_users → simulation (created_by) -->
<line x1="290" y1="180" x2="1760" y2="420" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.4"/>
<!-- auth_users → auth_user_activities -->
<line x1="160" y1="210" x2="160" y2="310" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.7"/>
<!-- auth_users → auth_password_reset_tokens -->
<line x1="230" y1="210" x2="390" y2="310" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.7"/>
<!-- stations → trains (source) -->
<line x1="820" y1="200" x2="700" y2="270" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.6"/>
<!-- stations → platforms -->
<line x1="900" y1="260" x2="900" y2="380" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.7"/>
<!-- stations → routes -->
<line x1="980" y1="200" x2="1100" y2="310" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.6"/>
<!-- routes → track_sections -->
<line x1="1120" y1="420" x2="1120" y2="530" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.6"/>
<!-- trains → schedules -->
<line x1="620" y1="360" x2="740" y2="540" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.6"/>
<!-- trains → conflicts -->
<line x1="660" y1="360" x2="500" y2="620" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.6"/>
<!-- trains → ai_recommendations -->
<line x1="700" y1="340" x2="1300" y2="640" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.4"/>
<!-- trains → delay_predictions -->
<line x1="680" y1="360" x2="1580" y2="650" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.4"/>
<!-- conflicts → conflict_recommendations -->
<line x1="420" y1="760" x2="420" y2="870" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.7"/>
<!-- schedules → section_occupancy -->
<line x1="800" y1="700" x2="1000" y2="820" class="rel-line rel-pk" marker-end="url(#arrow-green)" opacity="0.6"/>
<!-- auth_users → notifications (user) -->
<line x1="200" y1="210" x2="1800" y2="960" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.3"/>
<!-- auth_users → reports (generated_by) -->
<line x1="180" y1="210" x2="1980" y2="1360" class="rel-line rel-fk" marker-end="url(#arrow-blue)" opacity="0.3"/>

<script>
let scale = 1;
function zoom(factor) {
  scale *= factor;
  scale = Math.min(Math.max(scale, 0.3), 3);
  const svg = document.getElementById('erd');
  svg.style.transform = `scale(${scale})`;
  svg.style.transformOrigin = 'top left';
}
function resetZoom() {
  scale = 1;
  const svg = document.getElementById('erd');
  svg.style.transform = 'scale(1)';
}
</script>
