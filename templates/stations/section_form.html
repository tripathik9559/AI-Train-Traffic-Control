{% extends "base.html" %}{% load static %}
{% block content %}
<div class="page-header">
  <div class="page-header-left"><div class="page-title">{{ page_title }}</div></div>
  <div class="page-header-actions"><a href="{% url 'stations:list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a></div>
</div>
<div style="max-width:700px;">
  <form method="post">{% csrf_token %}
    <div class="card">
      {% for field in form %}
      <div class="form-group">
        <label class="form-label">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
        {{ field }}
        {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
        {% if field.errors %}<div class="invalid-feedback" style="display:block">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Save</button>
        <a href="{% url 'stations:list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
